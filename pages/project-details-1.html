<body
  class="bg-background dark:bg-bg-dark font-primary text-primary dark:text-button-title transition-colors duration-500 antialiased selection:bg-card/40 selection:text-primary">

  <!-- ==================== 1. الـ HEADER  ==================== -->
  <header
    class="fixed top-0 left-1/2 -translate-x-1/2 w-full z-50 backdrop-blur-xl bg-background/70 dark:bg-bg-dark/70 border border-border/20 dark:border-border-dark/20 transition-all duration-300 shadow-lg shadow-primary/5">
    <div id="scroll-progress"
      class="absolute bottom-0 left-6 right-6 h-[2px] bg-secondary transition-all duration-100 rounded-full"

      <div class="flex justify-start items-center h-full">

            class="font-bold text-primary dark:text-icon text-[24px] md:text-primary-size leading-none tracking-tight transition-transform duration-300 group-hover:scale-98">
            عليا عصفور
          </span>
          <span id="logo-subtitle"
            class="text-[10px] md:text-secondary-size text-secondary dark:text-icon/80 font-semibold tracking-wider mt-1 leading-none transition-all duration-300 group-hover:opacity-100">
            مطورة برمجيات
          </span>
        </a>
      </div>

      <nav id="main-nav" class="hidden md:flex items-center justify-center gap-8 h-full">
  <a href="#home" id="nav-home" class="text-secondary-size font-bold text-button hover:text-button-hover dark:text-icon dark:hover:text-button-title uppercase tracking-wider relative py-2 transition-all after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-primary dark:after:bg-icon after:transition-all hover:after:w-full flex items-center justify-center h-full">الرئيسية</a>
  <a href="#projects" id="nav-projects" class="text-secondary-size font-bold text-button hover:text-button-hover dark:text-icon dark:hover:text-button-title uppercase tracking-wider relative py-2 transition-all after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-primary dark:after:bg-icon after:transition-all hover:after:w-full flex items-center justify-center h-full">المشاريع</a>
  <a href="#skills" id="nav-skills" class="text-secondary-size font-bold text-button hover:text-button-hover dark:text-icon dark:hover:text-button-title uppercase tracking-wider relative py-2 transition-all after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-primary dark:after:bg-icon after:transition-all hover:after:w-full flex items-center justify-center h-full">المهارات</a>
  <a href="#timeline" id="nav-timeline" class="text-secondary-size font-bold text-button hover:text-button-hover dark:text-icon dark:hover:text-button-title uppercase tracking-wider relative py-2 transition-all after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-primary dark:after:bg-icon after:transition-all hover:after:w-full flex items-center justify-center h-full">مسيرتي</a>
  <a href="#contact" id="nav-contact" class="text-secondary-size font-bold text-button hover:text-button-hover dark:text-icon dark:hover:text-button-title uppercase tracking-wider relative py-2 transition-all after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-primary dark:after:bg-icon after:transition-all hover:after:w-full flex items-center justify-center h-full">اتصل بي</a>
</nav>

      <div class="flex items-center justify-end gap-3 h-full col-span-1 md:col-span-1">
        <div id="live-status"
          class="hidden lg:flex items-center justify-center gap-2 px-4 py-2 rounded-full border border-border/20 bg-input/15 dark:bg-input-dark/30 text-[11px] font-semibold">
          <span class="w-2 h-2 rounded-full bg-emerald-500 pulse-glow"></span>
          <span id="status-text" class="leading-none">متاحة للعمل البرمجي</span>
        </div>

        <button id="theme-toggle"
          class="p-3.5 rounded-full border border-border/20 dark:border-border-dark/20 bg-input/10 dark:bg-input-dark/20 text-primary dark:text-icon hover:scale-105 active:scale-95 transition-all duration-300 cursor-pointer flex items-center justify-center"
          aria-label="Toggle Theme">
          <svg id="theme-toggle-dark-icon" class="w-4 h-4 fill-none stroke-current stroke-2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg id="theme-toggle-light-icon" class="w-4 h-4 fill-none stroke-current stroke-2 hidden"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 3v2.25m0 13.5V21M4.22 4.22l1.59 1.59m12.38 12.38l1.59 1.59M3 12h2.25m13.5 0H21M4.22 19.78l1.59-1.59m12.38-12.38l1.59-1.59M12 7.5a4.5 4.5 0 110 9 4.5 4.5 0 010-9z" />
          </svg>
        </button>

        <button id="lang-toggle"
          class="p-2.5 rounded-full text-secondary-size font-bold tracking-widest bg-button text-button-title hover:bg-button-hover active:scale-95 hover:shadow-lg hover:shadow-primary/20 transition-all duration-300 cursor-pointer w-12 flex items-center justify-center border border-border/10 dark:border-border-dark/10">
          EN
        </button>

        <button id="mobile-menu-toggle"
          class="md:hidden p-3.5 rounded-full border border-border/20 dark:border-border-dark/20 bg-input/10 dark:bg-input-dark/20 text-primary dark:text-icon hover:scale-105 active:scale-95 transition-all duration-300 cursor-pointer flex items-center justify-center"
          aria-label="Toggle Mobile Menu">
          <i id="mobile-icon" class="fa-solid fa-bars text-sm"></i>
        </button>
      </div>

    </div>
